  } else {
    // mat / cons — no supplier
    thead=`<tr><th>Part / Cat. No.</th><th>Description</th><th>Unit</th><th>Qty/Unit</th><th>Std</th><th>AAW</th><th>Repair</th><th>Notes</th><th></th></tr>`;
    tbody=items.map((r,i)=>`<tr>
      <td class="w100"><input class="cell-edit mono" value="${esc(r.pn)}" onchange="updBom('${type}',${i},'pn',this.value)" placeholder="PN"></td>
      <td><input class="cell-edit" value="${esc(r.desc)}" onchange="updBom('${type}',${i},'desc',this.value)" placeholder="Description"></td>
      <td class="w60"><input class="cell-edit" value="${esc(r.unit)}" onchange="updBom('${type}',${i},'unit',this.value)" placeholder="kg/L/m"></td>
      <td class="w70 ctr"><input type="number" class="cell-edit mono" min="0" step="0.01" value="${r.qtyPerUnit||''}" onchange="updBom('${type}',${i},'qtyPerUnit',+this.value)"></td>
      <td class="w44 ctr"><input type="checkbox" ${r.isStd?'checked':''} onchange="updBom('${type}',${i},'isStd',this.checked)" style="accent-color:var(--green);width:15px;height:15px;cursor:pointer"></td>
      <td class="w44 ctr"><input type="checkbox" ${r.isAaw?'checked':''} onchange="updBom('${type}',${i},'isAaw',this.checked)" style="accent-color:var(--amber);width:15px;height:15px;cursor:pointer"></td>
      <td class="w44 ctr"><input type="checkbox" ${r.isRepair?'checked':''} onchange="updBom('${type}',${i},'isRepair',this.checked)" style="accent-color:var(--rose);width:15px;height:15px;cursor:pointer"></td>
      <td><input class="cell-edit" value="${esc(r.notes)}" onchange="updBom('${type}',${i},'notes',this.value)" placeholder="Notes"></td>
      <td class="w28 ctr"><button class="del-btn" onclick="delBom('${type}',${i})">×</button></td>
    </tr>`).join('');
  }

  return`${statsHTML}<div class="card" style="overflow-x:auto">
  <div class="card-head"><span class="card-title">${t.icon} ${t.label} Register</span><span class="card-meta">${items.length} items</span><button class="btn btn-primary btn-sm" onclick="addBomRow('${type}')">＋ Add ${t.label.replace(/s$/,'')}</button></div>
  ${items.length===0?emptyState(t.icon,'No '+t.label.toLowerCase()+' yet','Click ＋ Add to start. Link items to PFD steps using ＋ Resource.'):`<table class="tbl" style="min-width:800px"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`}
  <button class="add-row" onclick="addBomRow('${type}')">＋ Add ${t.label.replace(/s$/,'')}</button></div>`;
}

function addBomRow(type){
  const p=prog();
  let item={id:'bom_'+Date.now()};
  if(type==='parts')item={...item,pn:'',desc:'',qty:1,unit:'ea',isStd:false,isAaw:false,isRepair:false,notes:''};
  else if(type==='tools')item={...item,toolId:'',desc:'',spec:'',notes:''};
  else if(type==='equip')item={...item,equipId:'',desc:'',location:'',notes:''};
  else item={...item,pn:'',desc:'',unit:'',qtyPerUnit:0,isStd:false,isAaw:false,isRepair:false,notes:''};
  p.bom[type].push(item);save();render();
  // scroll to bottom of card
  setTimeout(()=>{const tbl=document.querySelector('.card table');if(tbl){const rows=tbl.querySelectorAll('tbody tr');if(rows.length>0)rows[rows.length-1].scrollIntoView({behavior:'smooth',block:'center'});}},50);
}
function updBom(type,i,f,v){prog().bom[type][i][f]=v;save();}
function delBom(type,i){const item=prog().bom[type][i];prog().pfd.forEach(s=>s.bomRefs=(s.bomRefs||[]).filter(r=>!(r.bomType===type&&r.itemId===item.id)));prog().bom[type].splice(i,1);save();render();}

// KITS
// ══════════════════════════════════════
function renderKits(p){
  const kits=p.bom.kits;
  const allItems=[];
  Object.entries(BOM_TYPES).forEach(([k,t])=>{p.bom[k].forEach(item=>{allItems.push({bomType:k,item,t});});});
  const totalItems=allItems.length;

  const kitCards=kits.map((kit,ki)=>{
    const totalBomRefs=kit.items.length;
    const summary=Object.entries(BOM_TYPES).map(([k,t])=>{const n=kit.items.filter(r=>r.bomType===k).length;return n>0?`${t.icon} ${n} ${t.label.toLowerCase()}`:null;}).filter(Boolean).join(' · ');
    const kitRows=kit.items.map((ref,ri)=>{
      const bt=p.bom[ref.bomType];if(!bt)return'';
      const item=bt.find(x=>x.id===ref.itemId);if(!item)return'';
      const t=BOM_TYPES[ref.bomType];const name=item.desc||(item.pn||item.toolId||item.equipId||'?');const pn=item.pn||item.toolId||item.equipId||'';
      const flags=[];
      if(item.isAaw)flags.push('<span class="flag flag-aaw">AAW</span>');
      if(item.isRepair)flags.push('<span class="flag flag-repair">RPR</span>');
      return`<div class="kit-item-row">
        <span class="kit-item-type" style="background:${{'parts':'var(--blue-pale)','tools':'var(--navy-pale)','equip':'var(--amber-pale)','mat':'var(--green-pale)','cons':'var(--red-pale)'}[ref.bomType]};color:${{'parts':'var(--blue)','tools':'var(--navy)','equip':'var(--amber)','mat':'var(--green)','cons':'var(--red)'}[ref.bomType]}">${t.icon} ${t.label}</span>
        <span class="kit-item-name">${esc(name)}</span>
        ${pn?`<span class="kit-item-pn">${esc(pn)}</span>`:''}
        <div style="display:flex;gap:3px">${flags.join('')}</div>
        <input class="kit-qty-input" type="number" min="0" step="0.01" value="${ref.qty||1}" onchange="updKitItem(${ki},${ri},'qty',+this.value)" title="Quantity">
        <span class="kit-unit">${item.unit||'ea'}</span>
        <button class="del-btn" onclick="delKitItem(${ki},${ri})">×</button>
      </div>`;
    }).join('');
    return`<div class="kit-card">
      <div class="kit-header">
        <span style="font-size:20px">📦</span>
        <input class="kit-name-input" value="${esc(kit.name)}" onchange="updKit(${ki},'name',this.value)" placeholder="Kit name (e.g. Overhaul Kit, Fastener Kit…)">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto">${totalBomRefs} items</span>
        <button class="del-btn" onclick="delKit(${ki})" style="margin-left:8px">×</button>
      </div>
      <div class="kit-body">
        ${kitRows||`<div class="kit-empty">No items yet — click Add Items to build this kit</div>`}
      </div>
      <div class="kit-summary">${summary||'Empty kit'}</div>
      <button class="kit-add-btn" onclick="openKitPick(${ki})">＋ Add Items from BoM</button>
    </div>`;
  }).join('');

  return`<div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
    <div style="font-size:13px;color:var(--muted)">${kits.length} kit${kits.length!==1?'s':''} · ${totalItems} total BoM items available</div>
    <button class="btn btn-primary btn-sm" onclick="addKit()">＋ New Kit</button>
  </div>
  ${kits.length===0?`<button class="new-kit-btn" onclick="addKit()">＋ Create your first kit<div style="font-size:12px;margin-top:4px;color:var(--muted)">e.g. Overhaul Kit, Fastener Kit, Bearing Kit, Repair Kit A…</div></button>`:`<div class="kit-list">${kitCards}</div>`}`;
}
function addKit(){prog().bom.kits.push({id:'kit_'+Date.now(),name:'',items:[]});save();render();}
function updKit(ki,f,v){prog().bom.kits[ki][f]=v;save();}
function delKit(ki){prog().bom.kits.splice(ki,1);save();render();}
function updKitItem(ki,ri,f,v){prog().bom.kits[ki].items[ri][f]=v;save();}
function delKitItem(ki,ri){prog().bom.kits[ki].items.splice(ri,1);save();render();}

// Kit item picker
function openKitPick(ki){
  kitPickTarget=ki;
  const p=prog();const kit=p.bom.kits[ki];
  kitPickSelected=kit.items.map(r=>r.bomType+'|'+r.itemId);
  kitPickFilter='all';
  // reuse same pick logic with different IDs
  bomPickSelected=[...kitPickSelected];bomPickFilter=kitPickFilter;
  refreshBomPickModal(p,'kitPickFilter','kitPickList','all');
  showModal('modalKitPick');
}
function saveKitPick(){
  const p=prog();const kit=p.bom.kits[kitPickTarget];
  // keep existing qty for items already in kit, add new with qty=1
  const existing={};kit.items.forEach(r=>{existing[r.bomType+'|'+r.itemId]=r.qty;});
  kit.items=bomPickSelected.map(key=>{const[bt,id]=key.split('|');return{bomType:bt,itemId:id,qty:existing[key]||1};});
  save();closeModal('modalKitPick');render();
}

// NPI TIMING PLAN
// ══════════════════════════════════════

const TP_PHASES=[
  {id:'s0',label:'Section 0 — Pre-Planning',       short:'S0',color:'#6b7a99'},
  {id:'s1',label:'Section 1 — Plan & Define',       short:'S1',color:'#0066cc'},
  {id:'s2',label:'Section 2 — Product Design & Dev',short:'S2',color:'#6d3fa0'},
  {id:'s3',label:'Section 3 — Process Design & Dev',short:'S3',color:'#0a7566'},
  {id:'s4',label:'Section 4 — Validation',          short:'S4',color:'#b45309'},
  {id:'s5',label:'Section 5 — Feedback & CI',       short:'S5',color:'#1a7a3c'},
];

// Standard APQP deliverable list — no dates, just deliverable + owner
const TP_DEFAULTS=[
  {phase:'s0',deliverable:'Bid & Estimating Support',owner:'ME Manager'},
  {phase:'s0',deliverable:'New Contract Introduction / Handover Meeting',owner:'ME Manager'},
  {phase:'s1',deliverable:'Specification Review & Interpretation',owner:'ME Lead'},
  {phase:'s1',deliverable:'CTQ Requirements Identified',owner:'ME Lead'},
  {phase:'s1',deliverable:'Work Scope Agreed',owner:'ME Lead'},
  {phase:'s1',deliverable:'Parts Obsolescence & Long-Lead Review',owner:'ME Lead'},
  {phase:'s1',deliverable:'Project Timing Plan Issued',owner:'ME Manager'},
  {phase:'s1',deliverable:'Gate 1 Sign-off',owner:'ME Manager'},
  {phase:'s2',deliverable:'Strip Down & Inspection Complete',owner:'ME Lead'},
  {phase:'s2',deliverable:'Repair Schemes Developed & Approved',owner:'ME Lead'},
  {phase:'s2',deliverable:'Bill of Materials Complete',owner:'ME Lead'},
  {phase:'s2',deliverable:'Accept / Reject Criteria Defined',owner:'ME Lead'},
  {phase:'s2',deliverable:'Obsolescence Risks Resolved',owner:'ME Lead'},
  {phase:'s2',deliverable:'Gate 2 Sign-off',owner:'ME Manager'},
  {phase:'s3',deliverable:'Process Flow Diagram (PFD)',owner:'ME Lead'},
  {phase:'s3',deliverable:'PFMEA Complete',owner:'ME Lead'},
  {phase:'s3',deliverable:'Work Instructions Authored & Reviewed',owner:'ME Lead'},
  {phase:'s3',deliverable:'Inspection Gates Defined',owner:'ME Lead'},
  {phase:'s3',deliverable:'Test Procedure Drafted',owner:'ME Lead'},
  {phase:'s3',deliverable:'Control Plan Complete',owner:'ME Lead'},
  {phase:'s3',deliverable:'Tooling & Test Equipment Ordered',owner:'ME Lead'},
  {phase:'s3',deliverable:'Test Rig Design & Build Started',owner:'ME Lead'},
  {phase:'s3',deliverable:'Gate 3 Sign-off',owner:'ME Manager'},
  {phase:'s4',deliverable:'Tooling & Equipment Qualified',owner:'ME Lead'},
  {phase:'s4',deliverable:'Test Rig Commissioned & Validated',owner:'ME Lead'},
  {phase:'s4',deliverable:'Trial Build Complete',owner:'ME Lead'},
  {phase:'s4',deliverable:'First Article Inspection (FAIR)',owner:'ME Lead'},
  {phase:'s4',deliverable:'Work Instructions Issued to Shop Floor',owner:'ME Lead'},
  {phase:'s4',deliverable:'Gate 4 Sign-off',owner:'ME Manager'},
  {phase:'s5',deliverable:'Production Monitoring & NCR Review Active',owner:'ME Lead'},
  {phase:'s5',deliverable:'Root Cause Analysis on Significant Defects',owner:'ME Lead'},
  {phase:'s5',deliverable:'Lessons Learned Captured',owner:'ME Lead'},
  {phase:'s5',deliverable:'Family File & PFMEA Updated',owner:'ME Lead'},
  {phase:'s5',deliverable:'Gate 5 Sign-off & Programme Close',owner:'ME Manager'},
];

function renderTimingPlan(){
  const p=prog();
  const tasks=p.timing;
  const total=tasks.length;
  const nG=tasks.filter(t=>t.rag==='G').length;
  const nA=tasks.filter(t=>t.rag==='A').length;
  const nR=tasks.filter(t=>t.rag==='R').length;
  const pct=total>0?Math.round(nG/total*100):0;

  // group by phase preserving original indices
  const byPhase={};
  TP_PHASES.forEach(ph=>{byPhase[ph.id]=[];});
  tasks.forEach((t,i)=>{const ph=t.phase||'s1';if(!byPhase[ph])byPhase[ph]=[];byPhase[ph].push({t,i});});

  let body='';
  TP_PHASES.forEach(ph=>{
    const rows=byPhase[ph.id]||[];
    if(!rows.length)return;
    const phG=rows.filter(r=>r.t.rag==='G').length;
    const phA=rows.filter(r=>r.t.rag==='A').length;
    const phR=rows.filter(r=>r.t.rag==='R').length;
    const phPct=Math.round(phG/rows.length*100);

    const tblRows=rows.map(({t,i})=>{
      const ragBtns=(['G','A','R']).map(r=>{
        const active=t.rag===r;
        const cls=active?`rag-btn rag-${r.toLowerCase()}`:'rag-btn';
        return`<button class="${cls}" onclick="setRAG(${i},'${r}')" title="${{G:'Green — On Track',A:'Amber — At Risk',R:'Red — Off Track / Blocked'}[r]}">${r}</button>`;
      }).join('');
      const needsRecovery=(t.rag==='A'||t.rag==='R')&&!t.notes;
      return`<tr${t.rag==='R'?' class="row-overdue"':''}>
        <td class="w28 ctr" style="color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace">${i+1}</td>
        <td><input class="cell-edit" value="${esc(t.deliverable)}" onchange="updTiming(${i},'deliverable',this.value)" placeholder="Deliverable"></td>
        <td class="w100"><input class="cell-edit" value="${esc(t.owner)}" onchange="updTiming(${i},'owner',this.value)" placeholder="Owner"></td>
        <td class="w110"><input type="date" class="cell-edit" value="${t.planned||''}" onchange="updTiming(${i},'planned',this.value)" title="Planned completion date"></td>
        <td class="w110"><input type="date" class="cell-edit" value="${t.actual||''}" onchange="updTiming(${i},'actual',this.value)" title="Actual completion date" style="${t.actual?'color:var(--green);font-weight:600':''}"></td>
        <td class="w90" style="text-align:center">${ragBtns}</td>
        <td><input class="cell-edit" value="${esc(t.notes)}" onchange="updTiming(${i},'notes',this.value)" placeholder="${needsRecovery?'⚠ Recovery plan required…':'Notes…'}" style="${needsRecovery?'border-color:var(--amber);background:var(--amber-pale)':''}"></td>
        <td class="w28 ctr"><button class="del-btn" onclick="delTiming(${i})">×</button></td>
      </tr>`;
    }).join('');

    body+=`<div class="card" style="margin-bottom:14px;overflow:hidden">
      <div class="phase-band" style="border-top:3px solid ${ph.color}">
        <span class="phase-pip" style="background:${ph.color}">${ph.short}</span>
        <span style="font-size:13px;font-weight:600;color:var(--ink);flex:1">${ph.label}</span>
        ${phR>0?`<span style="font-size:11px;font-weight:700;color:var(--red)">● ${phR} red</span>`:''}
        ${phA>0?`<span style="font-size:11px;font-weight:700;color:var(--amber)">● ${phA} amber</span>`:''}
        <span style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-left:4px">${phG}/${rows.length} green</span>
        <div style="width:70px;height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-left:8px"><div style="height:100%;width:${phPct}%;background:${ph.color};transition:width .3s"></div></div>
        <button class="btn btn-ghost btn-sm" onclick="addTimingPhase('${ph.id}')" style="font-size:11px;margin-left:6px">＋ Row</button>
      </div>
      <table class="tbl"><thead><tr>
        <th class="w28">#</th><th>Deliverable</th><th class="w100">Owner</th>
        <th class="w110">Planned Date</th><th class="w110">Actual Date</th>
        <th class="w90" style="text-align:center">RAG</th><th>Notes / Recovery Plan</th><th class="w28"></th>
      </tr></thead><tbody>${tblRows}</tbody></table>
    </div>`;
  });

  const alertBar=(nR>0||nA>0)?`<div class="alert-item ${nR>0?'alert-red':'alert-amber'}" style="margin-bottom:16px">
    ${nR>0?`🔴 <strong>${nR} red deliverable${nR!==1?'s':''}</strong> — recovery plan required in Notes column. `:''}
    ${nA>0?`⚠ <strong>${nA} amber deliverable${nA!==1?'s':''}</strong> — at risk, monitor closely.`:''}
  </div>`:'';

  return`<div class="sec-head">
    <div><div class="sec-eyebrow">Programme</div><div class="sec-title">NPI Timing Plan</div>
    <div class="sec-desc">Deliverable-based RAG tracker. Set Planned dates, record Actual dates, and rate each deliverable Green / Amber / Red. Red and amber items require a recovery plan.</div></div>
    <div class="sec-actions">
      <button class="btn btn-ghost btn-sm" onclick="loadDefaultTiming()">Load Template</button>
      <button class="btn btn-primary btn-sm" onclick="addTiming()">＋ Add Row</button>
    </div>
  </div>

  ${total>0?`<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <div class="kpi-card" style="--kpi-color:var(--green);flex:1;min-width:90px;padding:12px 14px;cursor:default">
      <div class="kpi-num" style="font-size:22px;color:var(--green)">${nG}<span style="font-size:13px;color:var(--muted)">/${total}</span></div>
      <div class="kpi-label">Green</div>
      <div style="height:3px;background:var(--line);border-radius:2px;margin-top:5px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--green)"></div></div>
    </div>
    <div class="kpi-card" style="--kpi-color:${nA>0?'var(--amber)':'var(--muted)'};flex:1;min-width:90px;padding:12px 14px;cursor:default"><div class="kpi-num" style="font-size:22px;color:${nA>0?'var(--amber)':'var(--muted)'}">${nA}</div><div class="kpi-label">Amber — At Risk</div></div>
    <div class="kpi-card" style="--kpi-color:${nR>0?'var(--red)':'var(--muted)'};flex:1;min-width:90px;padding:12px 14px;cursor:default"><div class="kpi-num" style="font-size:22px;color:${nR>0?'var(--red)':'var(--muted)'}">${nR}</div><div class="kpi-label">Red — Off Track</div></div>
    <div class="kpi-card" style="--kpi-color:var(--muted);flex:1;min-width:90px;padding:12px 14px;cursor:default"><div class="kpi-num" style="font-size:22px;color:var(--muted)">${total-nG-nA-nR}</div><div class="kpi-label">Not Rated</div></div>
  </div>${alertBar}${body}`
  :emptyState('📅','No deliverables yet','Click <strong>Load Template</strong> to populate with the standard APQP deliverable set, or <strong>＋ Add Row</strong> to build manually.')}`;
}

function addTiming(){
  prog().timing.push({id:'tp_'+Date.now(),phase:'s1',deliverable:'',owner:'',planned:'',actual:'',rag:'',notes:''});
  save();render();
}
function addTimingPhase(phaseId){
  prog().timing.push({id:'tp_'+Date.now(),phase:phaseId,deliverable:'',owner:'',planned:'',actual:'',rag:'',notes:''});
  save();render();
}
function updTiming(i,f,v){prog().timing[i][f]=v;save();}
function setRAG(i,val){const t=prog().timing[i];t.rag=(t.rag===val?'':val);save();render();}
function delTiming(i){prog().timing.splice(i,1);save();render();}
function loadDefaultTiming(){
  const p=prog();
  if(p.timing.length>0&&!confirm('Replace existing plan with the standard APQP deliverable template?'))return;
  p.timing=TP_DEFAULTS.map(d=>({id:'tp_'+Date.now()+'_'+Math.random().toString(36).slice(2),
    phase:d.phase,deliverable:d.deliverable,owner:d.owner,planned:'',actual:'',rag:'',notes:''}));
  save();render();
}

// UTILS

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function emptyState(icon,title,desc){return`<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-desc">${desc}</div></div>`;}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
async function launchApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  setSyncBadge('syncing','● loading…');
  await loadRemote();
  if(db.programmes.length===0) load();
  if(db.programmes.length===0){
    const p=newProgTemplate('New Programme','','','',new Date().toISOString().slice(0,10));
    db.programmes.push(p);
    save();
  }
  progId=db.programmes[0].id;
  initProgSelect();
  navigate('home');
}

(async()=>{
  const {data:{session}}=await supa.auth.getSession();
  if(session){
    currentUser=session.user;
    launchApp();
  }
})();
