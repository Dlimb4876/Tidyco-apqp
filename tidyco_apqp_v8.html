<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidyco — APQP Quality Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0d1117;--ink2:#1c2333;--mid:#404857;--muted:#7d8799;
  --line:#e2e6ed;--line2:#c8cfd9;--bg:#f6f8fb;--white:#ffffff;
  --blue:#0066cc;--blue-dark:#004fa3;--blue-pale:#e8f0fb;--blue-mid:#b3cef0;
  --green:#1a7a3c;--green-pale:#e6f4ec;--green-mid:#9ad6b2;
  --amber:#b45309;--amber-pale:#fef3e2;--amber-mid:#f6c87a;
  --red:#c0392b;--red-pale:#fdf0ee;
  --purple:#6d3fa0;--purple-pale:#f3eeff;
  --teal:#0a7566;--teal-pale:#e5f5f3;
  --navy:#1a3a5c;--navy-pale:#e8eef5;
  --rose:#9b1c4a;--rose-pale:#fce8f1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{height:52px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;border-bottom:2px solid var(--blue);gap:12px;}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer;}
.brand:hover .brand-name{color:#93c5fd;}
.brand-hex{width:26px;height:26px;background:var(--blue);clip-path:polygon(50% 0%,93.3% 25%,93.3% 75%,50% 100%,6.7% 75%,6.7% 25%);}
.brand-name{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:#fff;letter-spacing:1px;transition:color .15s;}
.brand-sep{color:#2d3f5e;margin:0 2px;}
.brand-sub{font-size:11px;color:#6b7a99;}
.back-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #2d3f5e;background:transparent;color:#8899bb;font-family:'IBM Plex Sans',sans-serif;transition:all .12s;white-space:nowrap;}
.back-btn:hover{background:#1a2236;color:#c8d4e8;border-color:#4a6080;}
.section-crumb{font-size:12px;color:#6b7a99;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.section-crumb strong{color:#c8d4e8;}
.prog-selector{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.prog-select-wrap select{background:#1a2236;border:1px solid #2d3f5e;color:#c8d4e8;padding:5px 10px;border-radius:4px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;outline:none;cursor:pointer;appearance:none;max-width:240px;}
.prog-select-wrap select:focus{border-color:var(--blue);}
.topbar-actions{display:flex;gap:5px;flex-shrink:0;}
.tbtn{padding:5px 11px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:'IBM Plex Sans',sans-serif;transition:all .12s;}
.tbtn-ghost{background:transparent;color:#8899bb;border:1px solid #2d3f5e;}
.tbtn-ghost:hover{background:#1a2236;color:#c8d4e8;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:0;}
.section-inner{padding:24px 28px 60px;}

/* DASHBOARD */
.dash-hero{background:linear-gradient(135deg,var(--ink) 0%,#1a2a4a 100%);padding:28px 32px 24px;border-bottom:1px solid #1c2c48;}
.dash-prog-name{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px;}
.dash-prog-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#8899bb;}
.dash-body{padding:22px 28px 60px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.kpi-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:var(--line2);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--blue));}
.kpi-num{font-size:30px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--kpi-color,var(--blue));line-height:1;}
.kpi-label{font-size:10px;color:var(--muted);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.gate-strip{display:flex;align-items:stretch;background:var(--white);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.gate-node{flex:1;padding:12px 14px;border-right:1px solid var(--line);cursor:pointer;transition:background .12s;}
.gate-node:last-child{border-right:none;}
.gate-node:hover{background:var(--bg);}
.gate-node-num{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.gate-node-name{font-size:11px;font-weight:600;color:var(--ink);}
.gate-status-dot{width:9px;height:9px;border-radius:50%;margin-top:5px;display:inline-block;}
.gs-signed{background:var(--green);} .gs-open{background:var(--amber);} .gs-pending{background:var(--line2);} .gs-blocked{background:var(--red);}
.alert-row{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.alert-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:6px;font-size:13px;}
.alert-red{background:var(--red-pale);border:1px solid #f0b4ae;color:var(--red);}
.alert-amber{background:var(--amber-pale);border:1px solid var(--amber-mid);color:var(--amber);}
.alert-blue{background:var(--blue-pale);border:1px solid var(--blue-mid);color:var(--blue-dark);}
.section-launcher{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.section-card{background:var(--white);border:1px solid var(--line);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:6px;}
.section-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);border-color:var(--sc-color,var(--blue));transform:translateY(-1px);}
.section-card-title{font-size:13px;font-weight:700;color:var(--ink);}
.section-card-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.section-card-status{margin-top:auto;display:flex;align-items:center;gap:8px;}
.sc-bar-wrap{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
.sc-bar{height:100%;border-radius:2px;transition:width .4s;}
.sc-count{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}

/* SEC HEADER */
.sec-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px;}
.sec-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.sec-title{font-size:20px;font-weight:700;color:var(--ink);}
.sec-desc{font-size:13px;color:var(--muted);margin-top:2px;}
.sec-actions{display:flex;gap:8px;align-items:flex-start;flex-shrink:0;}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'IBM Plex Sans',sans-serif;transition:all .12s;}
.btn-primary{background:var(--blue);color:white;}.btn-primary:hover{background:var(--blue-dark);}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--line2);}.btn-ghost:hover{background:var(--bg);border-color:var(--muted);}
.btn-green{background:var(--green);color:white;}.btn-green:hover{background:#155c2c;}
.btn-sm{padding:4px 10px;font-size:12px;}

/* CARD */
.card{background:var(--white);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:18px;}
.card-head{padding:11px 16px;border-bottom:1px solid var(--line);background:#fafbfd;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-title{font-size:13px;font-weight:600;color:var(--ink);}
.card-meta{font-size:12px;color:var(--muted);}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:6px 10px;background:#f4f6fa;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;}
.tbl td{padding:5px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#fafbfd;}
.tbl tr.row-overdue td{background:#fff8f8!important;}
.tbl tr.row-hi td{background:#fffaf5!important;}

/* INLINE EDIT */
.cell-edit{width:100%;min-width:44px;border:1px solid transparent;border-radius:3px;background:transparent;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);padding:3px 5px;outline:none;transition:border-color .1s,background .1s;resize:none;}
.cell-edit:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 2px rgba(0,102,204,.12);}
.cell-edit.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;}
select.cell-edit{cursor:pointer;}
textarea.cell-edit{min-height:38px;}
input[type=number].cell-edit{-moz-appearance:textfield;text-align:center;min-width:40px;max-width:54px;}
input[type=number].cell-edit::-webkit-inner-spin-button{opacity:0;}
input[type=number].cell-edit:hover::-webkit-inner-spin-button{opacity:1;}

/* FLAGS */
.flag{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.flag-aaw{background:#fff4e6;color:#c05621;border:1px solid #f6ad55;}
.flag-repair{background:var(--rose-pale);color:var(--rose);border:1px solid #f4a8c9;}
.flag-std{background:var(--green-pale);color:var(--green);border:1px solid var(--green-mid);}
.flag-cal{background:var(--blue-pale);color:var(--blue);border:1px solid var(--blue-mid);}
.flag-ncal{background:var(--bg);color:var(--muted);border:1px solid var(--line2);}
.flag-signed{background:var(--green-pale);color:var(--green);border:1px solid var(--green-mid);}

/* STATUS PILLS */
.sp{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.sp-open{background:var(--amber-pale);color:var(--amber);}
.sp-inprog{background:var(--blue-pale);color:var(--blue);}
.sp-done{background:var(--green-pale);color:var(--green);}
.sp-blocked{background:var(--red-pale);color:var(--red);}

/* RISK */
.rs{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;white-space:nowrap;}
.rs-lo{background:var(--green-pale);color:var(--green);border:1px solid var(--green-mid);}
.rs-med{background:var(--amber-pale);color:var(--amber);border:1px solid var(--amber-mid);}
.rs-hi{background:var(--red-pale);color:var(--red);border:1px solid #f0b4ae;}

/* RPN */
.rpn{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;min-width:34px;text-align:center;padding:2px 6px;border-radius:4px;display:inline-block;}
.rpn-lo{background:var(--green-pale);color:var(--green);}
.rpn-md{background:var(--amber-pale);color:var(--amber);}
.rpn-hi{background:var(--red-pale);color:var(--red);}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
.tag-ctq{background:var(--teal-pale);color:var(--teal);border:1px solid #9ed6cf;}
.tag-amber{background:var(--amber-pale);color:var(--amber);}
.tag-step{background:var(--navy-pale);color:var(--navy);border:1px solid #b3c8e0;font-weight:600;}
.tag-sub{background:var(--purple-pale);color:var(--purple);border:1px solid #c4a8e6;}

/* PFMEA STEP GROUP */
.pfmea-step-group{margin-bottom:0;}
.pfmea-step-header{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f4f6fa;border-bottom:1px solid var(--line);border-top:1px solid var(--line);}
.pfmea-step-header:first-child{border-top:none;}
.pfmea-step-label{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--navy);}
.pfmea-step-ctqs{display:flex;gap:4px;flex-wrap:wrap;}
.pfmea-add-row{display:flex;align-items:center;gap:5px;padding:6px 12px;background:#fafbfe;border-top:1px dashed var(--line);font-size:11px;color:var(--muted);cursor:pointer;}
.pfmea-add-row:hover{color:var(--blue);background:var(--blue-pale);}
.pfmea-row-sub td{background:#fefefe;}

/* CTQ PICK */
.ctq-pick{display:flex;flex-wrap:wrap;gap:3px;min-height:24px;}
.ctq-pick-item{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:20px;font-size:10px;font-family:'IBM Plex Mono',monospace;background:var(--teal-pale);color:var(--teal);border:1px solid #9ed6cf;cursor:pointer;}
.ctq-pick-item:hover{background:#c5ebe6;}
.ctq-pick-add{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:20px;font-size:10px;background:var(--bg);color:var(--muted);border:1px dashed var(--line2);cursor:pointer;}
.ctq-pick-add:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale);}

/* BOM PILLS */
.res-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;transition:opacity .1s;}
.res-pill:hover{opacity:.7;}
.res-pill-tool{background:var(--navy-pale);color:var(--navy);border:1px solid #b3c8e0;}
.res-pill-equip{background:var(--amber-pale);color:var(--amber);border:1px solid var(--amber-mid);}
.res-pill-mat{background:var(--green-pale);color:var(--green);border:1px solid var(--green-mid);}
.res-pill-cons{background:var(--red-pale);color:var(--red);border:1px solid #f0b4ae;}
.res-pill-part{background:var(--blue-pale);color:var(--blue);border:1px solid var(--blue-mid);}
.res-add-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;background:transparent;color:var(--muted);border:1px dashed var(--line2);cursor:pointer;}
.res-add-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale);}

/* FLOW RIBBON */
.flow-ribbon{display:flex;align-items:stretch;margin-bottom:18px;overflow-x:auto;background:var(--white);border:1px solid var(--line);border-radius:8px;}
.flow-node{flex:1;min-width:74px;max-width:120px;padding:9px 10px;border-right:1px solid var(--line);cursor:pointer;transition:background .12s;}
.flow-node:last-child{border-right:none;}
.flow-node:hover{background:var(--blue-pale);}
.flow-node.is-sub{background:var(--purple-pale);}
.flow-node-num{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:var(--muted);}
.flow-node-name{font-size:10px;font-weight:600;color:var(--ink);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.flow-arrow{display:flex;align-items:center;color:var(--line2);font-size:16px;padding:0;flex-shrink:0;align-self:center;}

/* PFD */
.step-row{border-bottom:1px solid var(--line);}
.step-row:last-child{border-bottom:none;}
.step-main-row{display:flex;align-items:stretch;}
.step-num-cell{width:54px;min-width:54px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px 5px 7px;border-right:1px solid var(--line);background:#fafbfd;gap:3px;}
.step-num-badge{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--white);background:var(--purple);border-radius:5px;padding:2px 6px;line-height:1;}
.mini-btn{width:20px;height:18px;border:none;background:transparent;color:var(--line2);font-size:11px;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.mini-btn:hover{color:var(--blue);background:var(--blue-pale);}
.mini-btn.danger:hover{color:var(--red);background:var(--red-pale);}
.step-body{flex:1;display:flex;flex-direction:column;}
.step-fields{display:flex;align-items:stretch;flex:1;}
.step-field{padding:8px;border-right:1px solid var(--line);display:flex;align-items:flex-start;}
.step-field:last-child{border-right:none;}
.step-field.f-op{width:190px;min-width:150px;}
.step-field.f-detail{flex:1;}
.step-field.f-ctq{width:150px;min-width:120px;}
.step-field.f-pfmea{width:80px;min-width:70px;justify-content:center;align-items:center;}
.step-resources{border-top:1px solid var(--line);background:#f9fbfd;padding:6px 8px 6px 62px;display:flex;flex-wrap:wrap;align-items:center;gap:4px;}
.sub-group-header{display:flex;align-items:center;gap:10px;padding:7px 12px 7px 14px;background:var(--purple-pale);border-bottom:1px solid #d8c8f0;cursor:pointer;}
.sub-group-header:hover{background:#e9deff;}
.sub-group-body.collapsed{display:none;}
.insert-row{display:flex;align-items:center;justify-content:center;padding:2px 0;opacity:0;transition:opacity .15s;}
.insert-row:hover{opacity:1!important;}
.step-row:hover+.insert-row{opacity:.5;}
.insert-btn{padding:1px 9px;font-size:10px;border:1px dashed var(--blue);background:var(--blue-pale);color:var(--blue);border-radius:20px;cursor:pointer;font-family:'IBM Plex Mono',monospace;}
.insert-btn:hover{background:var(--blue);color:white;}

/* GATE */
.gate-section{margin-bottom:22px;}
.gate-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border:1px solid var(--line);border-radius:10px 10px 0 0;cursor:pointer;}
.gate-header.signed{background:var(--green-pale);border-color:var(--green-mid);}
.gate-header.blocked{background:var(--red-pale);border-color:#f0b4ae;}
.gate-header.open{background:var(--amber-pale);border-color:var(--amber-mid);}
.gate-num-badge{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;padding:3px 9px;border-radius:5px;color:white;background:var(--blue);}
.gate-num-badge.signed{background:var(--green);}.gate-num-badge.open{background:var(--amber);}.gate-num-badge.blocked{background:var(--red);}
.gate-body{background:var(--white);border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px;}
.gate-body.collapsed{display:none;}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:9px 16px;border-bottom:1px solid var(--line);}
.checklist-item:last-child{border-bottom:none;}
.checklist-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);flex-shrink:0;margin-top:2px;cursor:pointer;}
.checklist-item.checked{background:#fafffe;}
.checklist-item label{font-size:13px;color:var(--ink);cursor:pointer;flex:1;}
.checklist-item.checked label{color:var(--muted);text-decoration:line-through;}
.cp-bar-wrap{width:100px;height:5px;background:var(--line);border-radius:3px;overflow:hidden;}
.cp-bar{height:100%;border-radius:3px;background:var(--blue);transition:width .3s;}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-top:1px dashed var(--line);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;width:100%;text-align:left;font-family:'IBM Plex Sans',sans-serif;transition:all .12s;}
.add-row:hover{color:var(--blue);background:var(--blue-pale);}

/* DELETE */
.del-btn{width:22px;height:22px;border:none;background:transparent;color:var(--line2);font-size:15px;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.del-btn:hover{color:var(--red);background:var(--red-pale);}

/* KIT BUILDER */
.kit-list{display:flex;flex-direction:column;gap:16px;}
.kit-card{background:var(--white);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.kit-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fafbfd;border-bottom:1px solid var(--line);}
.kit-name-input{flex:1;font-size:14px;font-weight:600;border:none;background:transparent;outline:none;color:var(--ink);font-family:'IBM Plex Sans',sans-serif;padding:2px 4px;border-radius:3px;}
.kit-name-input:focus{background:var(--bg);border:1px solid var(--blue);}
.kit-body{padding:0;}
.kit-item-row{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--line);}
.kit-item-row:last-child{border-bottom:none;}
.kit-item-type{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.kit-item-name{flex:1;font-size:13px;color:var(--ink);}
.kit-item-pn{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.kit-qty-input{width:52px;padding:3px 6px;border:1px solid var(--line);border-radius:4px;font-size:13px;font-family:'IBM Plex Mono',monospace;text-align:center;color:var(--ink);outline:none;}
.kit-qty-input:focus{border-color:var(--blue);}
.kit-unit{font-size:11px;color:var(--muted);min-width:28px;}
.kit-add-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border:none;border-top:1px dashed var(--line);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;width:100%;font-family:'IBM Plex Sans',sans-serif;transition:all .12s;}
.kit-add-btn:hover{color:var(--blue);background:var(--blue-pale);}
.kit-empty{padding:18px;text-align:center;color:var(--muted);font-size:12px;}
.kit-summary{display:flex;gap:12px;padding:8px 14px;border-top:1px solid var(--line);background:#fafbfd;font-size:11px;color:var(--muted);flex-wrap:wrap;}
.new-kit-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px;border:2px dashed var(--line);border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-family:'IBM Plex Sans',sans-serif;background:transparent;width:100%;transition:all .15s;}
.new-kit-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-pale);}

/* BOM ITEM PICKER MODAL */
.bom-pick-list{display:flex;flex-direction:column;gap:5px;max-height:360px;overflow-y:auto;}
.bom-pick-item{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border:1px solid var(--line);border-radius:5px;cursor:pointer;background:var(--white);transition:background .1s;}
.bom-pick-item:hover{background:var(--blue-pale);border-color:var(--blue-mid);}
.bom-pick-item.selected{background:var(--blue-pale);border-color:var(--blue);}
.bom-pick-item input{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;margin-top:2px;}
.bom-pick-info{flex:1;}
.bom-pick-name{font-size:13px;font-weight:600;color:var(--ink);}
.bom-pick-meta{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:1px;}
.bom-filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.bom-filter-btn{padding:3px 9px;border-radius:20px;font-size:11px;border:1px solid var(--line2);background:var(--bg);color:var(--muted);cursor:pointer;}
.bom-filter-btn.active{background:var(--blue-pale);color:var(--blue);border-color:var(--blue);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(13,17,23,.65);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(3px);}
.modal{background:var(--white);border-radius:10px;padding:26px;width:540px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);}
.modal-sm{width:400px;}.modal-lg{width:700px;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:5px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);background:var(--white);outline:none;transition:border-color .12s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,102,204,.1);}
.field textarea{min-height:60px;resize:vertical;}
.field-row{display:flex;gap:10px;}.field-row .field{flex:1;}
.field-checkbox{display:flex;align-items:center;gap:8px;padding:6px 0;}
.field-checkbox input{width:15px;height:15px;accent-color:var(--blue);}
.field-checkbox label{font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;text-transform:none;letter-spacing:0;}
.info-banner{display:flex;align-items:flex-start;gap:10px;background:var(--blue-pale);border:1px solid var(--blue-mid);border-radius:6px;padding:10px 13px;margin-bottom:16px;font-size:13px;color:var(--blue-dark);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:32px;margin-bottom:8px;}
.empty-title{font-size:14px;font-weight:600;color:var(--mid);}
.empty-desc{font-size:12px;margin-top:3px;}

/* BOM SUB-NAV */
.bom-subnav{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:18px;background:var(--white);border-radius:8px 8px 0 0;overflow:hidden;border:1px solid var(--line);}
.bom-tab{padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);background:transparent;border-top:none;border-left:none;border-right:none;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.bom-tab:hover{color:var(--ink);background:var(--bg);}
.bom-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;background:var(--blue-pale);}

/* TIMING PLAN */
.rag-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;cursor:pointer;border:2px solid var(--line2);background:var(--bg);color:var(--muted);transition:all .12s;flex-shrink:0;}
.rag-btn:hover{transform:scale(1.1);}
.rag-btn.rag-g{background:var(--green);border-color:#155c2c;color:white;}
.rag-btn.rag-a{background:var(--amber);border-color:#7a3606;color:white;}
.rag-btn.rag-r{background:var(--red);border-color:#8b2218;color:white;}
.phase-band{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--line);background:#f8f9fc;}
.phase-pip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:3px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:white;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--line2);}

/* PROJECTS HOME */
.proj-home{padding:36px 40px;max-width:1100px;margin:0 auto;}
.proj-home-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.proj-home-title{font-size:26px;font-weight:700;color:var(--ink);}
.proj-home-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.proj-family-group{margin-bottom:36px;}
.proj-family-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding-bottom:8px;border-bottom:2px solid var(--line);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.proj-family-label span{font-size:15px;}
.proj-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.proj-card{background:var(--white);border:1.5px solid var(--line);border-radius:10px;padding:20px 22px;cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative;}
.proj-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:var(--blue-mid);}
.proj-card-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:5px;line-height:1.3;}
.proj-card-meta{font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px;}
.proj-card-meta span{background:var(--bg);border-radius:4px;padding:2px 7px;}
.proj-card-gate{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.proj-card-gate-label{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--muted);letter-spacing:.4px;}
.proj-gate-pip{width:28px;height:6px;border-radius:3px;background:var(--line);}
.proj-gate-pip.done{background:var(--green);}
.proj-gate-pip.active{background:var(--amber);}
.proj-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.proj-rag{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;}
.proj-rag-g{background:var(--green);}
.proj-rag-a{background:var(--amber);}
.proj-rag-r{background:var(--red);}
.proj-rag-n{background:var(--line2);}
.proj-add-card{background:transparent;border:2px dashed var(--line2);border-radius:10px;padding:20px 22px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;font-weight:500;transition:border-color .15s,color .15s;min-height:100px;}
.proj-add-card:hover{border-color:var(--blue);color:var(--blue);}



/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:4px;margin-left:4px;}
.bc-sep{color:rgba(255,255,255,.3);font-size:14px;line-height:1;}
.bc-item{background:none;border:none;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;cursor:pointer;padding:2px 4px;border-radius:4px;font-family:'IBM Plex Sans',sans-serif;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}
.bc-item:hover{color:white;background:rgba(255,255,255,.1);}
.bc-current{color:white;font-size:13px;font-weight:600;padding:2px 4px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}

/* GANTT TIMING PLAN */
.gantt-tbl{border-collapse:collapse;}
.gantt-tbl th,.gantt-tbl td{border:1px solid var(--line);padding:0;}
.gantt-month-row th{background:var(--ink);color:white;font-size:10px;font-weight:600;text-align:center;padding:4px 2px;letter-spacing:.3px;}
.gantt-week-row th{background:var(--ink2);color:var(--muted);font-size:9px;font-weight:500;text-align:center;padding:3px 1px;font-family:'IBM Plex Mono',monospace;}
.gantt-th-task{text-align:left!important;padding:4px 8px!important;color:white!important;}
.gantt-th-sec{text-align:left!important;padding:4px 6px!important;color:white!important;}
.gantt-th-notes{text-align:left!important;padding:4px 6px!important;color:white!important;}
.gantt-mo{border-left:2px solid rgba(255,255,255,.15)!important;}
.gantt-wk{border-left:1px solid rgba(255,255,255,.08)!important;}
.gantt-row td{height:36px;vertical-align:middle;}
.gantt-row:nth-child(even){background:var(--bg);}
.gantt-task-cell{padding:2px 6px!important;}
.gantt-sec-cell{padding:2px 4px!important;}
.gantt-notes-cell{padding:2px 6px!important;}
.gantt-cell{cursor:pointer;transition:background .1s;border-left:1px solid var(--line)!important;}
.gantt-cell:hover{background:var(--blue-pale)!important;opacity:.8;}
.gantt-filled{opacity:.85;}
.gantt-add-row td{background:transparent;border:none!important;padding:2px 0!important;}
.gantt-plan-row{background:var(--white);}
.gantt-act-row{background:#f8fafc;}
.gantt-rowlabel{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);text-align:center;padding:2px 3px!important;white-space:nowrap;background:var(--bg);border-right:2px solid var(--line)!important;}
.gantt-rowlabel-act{color:#94a3b8;background:#f1f5f9;}
.gantt-actual{background:#f8fafc;}
.gantt-today-hdr{background:#1e40af!important;color:#93c5fd!important;font-weight:700!important;}
.gantt-today-col{border-left:2px solid #3b82f6!important;border-right:2px solid #3b82f6!important;}
.gantt-task-cell{vertical-align:top!important;padding:4px 6px!important;}
.gantt-role-cell{vertical-align:middle!important;padding:2px 4px!important;}
.gantt-actual-cell{background:#fdf6ee;}
.gantt-collapsed-wk{background:#e2e8f0!important;color:#94a3b8!important;font-size:10px!important;cursor:pointer;}
.gantt-collapsed-cell{background:#f1f5f9;cursor:default;}
.gantt-mo-today{background:#1e3a8a!important;}
.gantt-th-left{text-align:left!important;padding:4px 8px!important;color:white!important;}

/* TABLE FIXES */
.tbl select{min-width:90px;max-width:100%;}
.tbl input[type="text"]{min-width:60px;}
.tbl input[type="date"]{min-width:110px;}
td select{min-width:90px;}
td input{box-sizing:border-box;}
/* wider columns for key tables */
.ctq-tbl td:nth-child(2){min-width:40px;}  /* ref badge */
.ctq-tbl td:nth-child(3){min-width:180px;} /* requirement */
.ctq-tbl td:nth-child(4){min-width:100px;} /* spec */
.ctq-tbl td:nth-child(5){min-width:100px;} /* tol */
.ctq-tbl td:nth-child(6){min-width:110px;} /* source */
.ctq-tbl td:nth-child(7){min-width:130px;} /* oos action */
.act-tbl td:nth-child(2){min-width:200px;} /* description */
.act-tbl td:nth-child(3){min-width:90px;}  /* owner */
.act-tbl td:nth-child(6){min-width:100px;} /* source */
.act-tbl td:nth-child(7){min-width:120px;} /* notes */
.pfmea-mode-cell{background:#f0f4ff;}
.pfmea-effect-cell{background:#fafbff;}

/* PROJECT EDIT MODAL */
/* LOGIN SCREEN */
.login-shell{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--ink);font-family:'IBM Plex Sans',sans-serif;}
.login-box{background:var(--white);border-radius:12px;padding:40px 44px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.login-logo-name{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:1px;}
.login-logo-sub{font-size:13px;color:var(--muted);margin-top:1px;}
.login-title{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--mid);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase;}
.login-field input{width:100%;padding:10px 13px;border:1.5px solid var(--line2);border-radius:6px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:border-color .15s;}
.login-field input:focus{border-color:var(--blue);}
.login-btn{width:100%;padding:11px;background:var(--blue);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;margin-top:8px;transition:background .15s;}
.login-btn:hover{background:var(--blue-dark);}
.login-btn:disabled{background:var(--muted);cursor:default;}
.login-err{background:var(--red-pale);color:var(--red);border:1px solid #f0b4ae;border-radius:6px;padding:9px 12px;font-size:13px;margin-bottom:14px;display:none;}
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.08);}
.sync-badge.syncing{color:#93c5fd;}
.sync-badge.saved{color:#86efac;}
.sync-badge.error{color:#fca5a5;}
td.w28{width:28px}td.w36{width:36px}td.w44{width:44px}td.w50{width:50px}td.w60{width:60px}
td.w70{width:70px}td.w80{width:80px}td.w90{width:90px}td.w100{width:100px}td.w110{width:110px}
td.w120{width:120px}td.w140{width:140px}td.ctr{text-align:center}
</style>
</head>
<body>
<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-shell">
  <div class="login-box">
    <div class="login-logo">
      <div>
        <div class="login-logo-name">TIDYCO</div>
        <div class="login-logo-sub">APQP Quality Tool</div>
      </div>
    </div>
    <div class="login-title">Sign in</div>
    <div class="login-sub">Manufacturing Engineering — Rail Overhaul</div>
    <div class="login-err" id="loginErr"></div>
    <div class="login-field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@company.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div class="shell" id="appShell" style="display:none">

<div class="topbar">
  <div class="topbar-left">
    <div class="brand" onclick="goProjects()" style="cursor:pointer">
      <div class="brand-hex"></div>
      <span class="brand-name">TIDYCO</span>
      <span class="brand-sep">|</span>
      <span class="brand-sub">APQP</span>
    </div>
    <nav class="breadcrumb" id="breadcrumb" style="display:none">
      <span class="bc-sep">›</span>
      <button class="bc-item" id="bc-project" onclick="navigate('project')" style="display:none"></button>
      <span class="bc-sep" id="bc-sep2" style="display:none">›</span>
      <span class="bc-current" id="bc-section" style="display:none"></span>
    </nav>
    <button class="back-btn" id="backBtn" style="display:none" onclick="navigate('project')">← Dashboard</button>
  </div>
  <div class="topbar-actions">
    <span class="sync-badge" id="syncBadge">●  saved</span>
    <button class="tbtn tbtn-ghost" onclick="exportJSON()">⬇ Export</button>
    <button class="tbtn tbtn-ghost" onclick="document.getElementById('importInput').click()">⬆ Import</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="tbtn tbtn-ghost" onclick="doLogout()" title="Sign out" style="margin-left:4px">⏻</button>
  </div>
</div>

<div class="main" id="mainContent"></div>
</div><!-- end appShell -->

<!-- MODAL: New Project -->
<div class="modal-bg" id="modalNewProj" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-title">New Project</div>
    <div class="field"><label>Project Name *</label><input id="np_name" placeholder="e.g. Class 158 Traction Motor Overhaul"></div>
    <div class="field-row"><div class="field"><label>Customer</label><input id="np_customer"></div><div class="field"><label>Unit / Product</label><input id="np_unit"></div></div>
    <div class="field-row">
      <div class="field"><label>Product Family</label><select id="np_family"><option value="HVAC">HVAC</option><option value="Rotating Machines">Rotating Machines</option><option value="Pneumatics">Pneumatics</option><option value="Other" selected>Other</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>ME Lead</label><input id="np_lead"></div>
      <div class="field"><label>Project Manager</label><input id="np_pm"></div>
    </div>
    <div class="field"><label>Start Date</label><input type="date" id="np_date"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modalNewProj')">Cancel</button><button class="btn btn-primary" onclick="createProg()">Create</button></div>
  </div>
</div>

<!-- MODAL: Edit Project -->
<div class="modal-bg" id="modalEditProj" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-title">Edit Project</div>
    <div class="field"><label>Project Name *</label><input id="ep_name" placeholder="e.g. Class 158 Traction Motor Overhaul"></div>
    <div class="field-row"><div class="field"><label>Customer</label><input id="ep_customer"></div><div class="field"><label>Unit / Product</label><input id="ep_unit"></div></div>
    <div class="field-row">
      <div class="field"><label>Product Family</label><select id="ep_family"><option value="HVAC">HVAC</option><option value="Rotating Machines">Rotating Machines</option><option value="Pneumatics">Pneumatics</option><option value="Other">Other</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>ME Lead</label><input id="ep_lead"></div>
      <div class="field"><label>Project Manager</label><input id="ep_pm"></div>
    </div>
    <div class="field"><label>Start Date</label><input type="date" id="ep_date"></div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
      <button class="btn btn-ghost" style="color:var(--red);border-color:var(--red)" onclick="deleteProject()">Delete Project</button>
      <div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="closeModal('modalEditProj')">Cancel</button><button class="btn btn-primary" onclick="saveEditProject()">Save</button></div>
    </div>
  </div>
</div>

<!-- MODAL: Insert PFD step -->
<div class="modal-bg" id="modalInsert" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-title">Insert Step</div>
    <div class="field"><label>Step Number</label><input type="number" id="insertNum" min="1" step="1"><div style="font-size:11px;color:var(--muted);margin-top:3px" id="insertNumHint"></div></div>
    <div class="field"><label>Step Type</label><select id="insertType"><option value="step">Normal Step</option><option value="group">Sub-assembly Group Header</option><option value="sub">Sub-assembly Step</option></select></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('modalInsert')">Cancel</button><button class="btn btn-primary" onclick="confirmInsert()">Insert</button></div>
  </div>
</div>

<!-- MODAL: CTQ picker -->
<div class="modal-bg" id="modalCtqPick" style="display:none">
  <div class="modal">

function save(){

  clearTimeout(saveTimer);

async function saveRemote(){
  if(!currentUser)return;
  const email=currentUser.email;
  const now=new Date().toISOString();
  try{
    for(const p of db.programmes){
      // Try update first
      const {data:updated,error:updErr}=await supa
        .from('programmes')
        .update({name:p.name,updated_at:now,updated_by:email,data:p})
        .eq('prog_id',p.id)
        .select();
      if(updErr){console.error('Update err',updErr);setSyncBadge('error','● save failed');return;}
      // If no row was updated, insert
      if(!updated||updated.length===0){
        const {error:insErr}=await supa
          .from('programmes')
          .insert({prog_id:p.id,name:p.name,updated_at:now,updated_by:email,data:p});
        if(insErr){console.error('Insert err',insErr);setSyncBadge('error','● save failed — check console');return;}
      }
    }
    setSyncBadge('saved','● saved  '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' · '+email.split('@')[0]);
  }catch(e){console.error('saveRemote exception',e);setSyncBadge('error','● save failed');}
}

async function loadRemote(){

function migrateprog(p){
  if(!p)return newProgTemplate('Untitled','','','Other','','',new Date().toISOString().slice(0,10));
  if(!p.bom)p.bom={parts:[],tools:[],equip:[],mat:[],cons:[],kits:[]};
  ['parts','tools','equip','mat','cons'].forEach(k=>{if(!p.bom[k])p.bom[k]=[];});
  if(!p.bom.kits)p.bom.kits=[];
  if(!p.actions)p.actions=[];
  if(!p.risks)p.risks=[];
  if(!p.timing)p.timing=[];
  if(!p.gantt)p.gantt=[];
  if(!p.ganttStart&&p.date)p.ganttStart=p.date;
  if(!p.gates){p.gates=GATE_DEFS.map(g=>({gateNum:g.num,checks:g.items.map(()=>false),sigs:g.signatories.map(r=>({role:r,name:'',date:'',signed:false}))}));}
  p.gates.forEach((gd,gi)=>{
    if(gi>=GATE_DEFS.length)return;
    const gdef=GATE_DEFS[gi];
    while(gd.checks.length<gdef.items.length)gd.checks.push(false);
    if(!gd.sigs){
      gd.sigs=gdef.signatories.map(role=>({role,name:gd.signedBy||'',date:gd.signedDate||'',signed:gd.status==='signed'}));
      delete gd.status;delete gd.signedBy;delete gd.signedDate;
    }
    gdef.signatories.forEach(role=>{if(!gd.sigs.find(s=>s.role===role))gd.sigs.push({role,name:'',date:'',signed:false});});
  });
  p.pfd.forEach((s,i)=>{if(s.stepNum===undefined)s.stepNum=(i+1)*10;if(!s.type)s.type='step';if(!s.bomRefs)s.bomRefs=[];if(s.resources){delete s.resources;}});
  p.pfmea.forEach(r=>{if(!r.id)r.id='f_'+Math.random().toString(36).slice(2);});
  p.risks.forEach(r=>{if(!r.id)r.id='r_'+Math.random().toString(36).slice(2);});
  p.actions.forEach(a=>{if(!a.id)a.id='a_'+Math.random().toString(36).slice(2);});
  return p;
}

function renderProjects(){
  const user=currentUser?currentUser.email.split('@')[0]:'';
  let html=`<div class="proj-home">
    <div class="proj-home-header">
      <div>
        <div class="proj-home-title">Projects</div>
        <div class="proj-home-sub">Signed in as ${esc(user)}</div>
      </div>
      <button class="btn btn-primary" onclick="showModal('modalNewProj')">＋ New Project</button>
    </div>`;

  if(db.programmes.length===0){
    html+=`<div style="text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:16px">📋</div>
      <div style="font-size:18px;font-weight:600;color:var(--mid);margin-bottom:8px">No projects yet</div>
      <div style="font-size:13px;margin-bottom:24px">Create your first project to get started</div>
      <button class="btn btn-primary" onclick="showModal('modalNewProj')">＋ New Project</button>
    </div>`;
  } else {

      projs.forEach(p=>{
        const gates=p.gates||[];
        const curGate=gates.findIndex(g=>!gateAllSigned(g));

        const openAct=(p.actions||[]).filter(a=>a.status!=='Closed').length;
        const overdueAct=(p.actions||[]).filter(a=>a.status!=='Closed'&&a.due&&new Date(a.due)<new Date()).length;
        const highRPN=(p.pfmea||[]).filter(r=>calcRPN(r)>=100).length;
        // RAG based on overdue actions or high RPN
        const rag=overdueAct>0||highRPN>0?'r':openAct>0?'a':'g';
        const ragLabel=rag==='r'?'Needs Attention':rag==='a'?'In Progress':'On Track';
        const pips=GATE_DEFS.map((g,i)=>{
          const gd=gates[i];
          const cls=gd&&gateAllSigned(gd)?'done':i===curGate?'active':'';
          return`<div class="proj-gate-pip ${cls}" title="Gate ${g.num}: ${g.name}"></div>`;
        }).join('');
        const lastSaved=p.updated_at?new Date(p.updated_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
        html+=`<div class="proj-card" onclick="openProject('${p.id}')">

            ${p.customer?`<span>👤 ${esc(p.customer)}</span>`:''}
